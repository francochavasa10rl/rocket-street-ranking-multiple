<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Rocket Street Ranking</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="main-layout">  
    <div class="left-panel">
      <h1 class="section-title">ARMA TU POWER RANKING</h1>

      <input type="text" id="personName" placeholder="TU NOMBRE" maxlength="25">
      <div id="charCounter">0 / 25</div>

      <!-- TOGGLE -->
      <div class="region-toggle">
        <button id="naBtn" class="toggle active">NA OPEN 5</button>
        <button id="menaBtn" class="toggle">MENA OPEN 5</button>
      </div>

      <ul id="teams"></ul>
    </div>  

    <div class="right-panel">
      <div class="preview-box">  
        <h3>PREVIEW</h3>  
        <img id="previewImage">
      </div>

      <div class="share-buttons">  
        <button id="downloadBtn" class="btn download">Descargar imagen</button>  
        <button id="shareBtn" class="btn twitter">Descargar y Compartir en X</button>  
        <a href="https://discord.gg/zWMaC4Qwak" target="_blank" class="btn discord">Unirse al Discord</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
